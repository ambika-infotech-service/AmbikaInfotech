<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Ambika Infotech - Professional IT Services & Solutions</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- SEO Meta Tags -->
    <meta
      name="description"
      content="Ambika Infotech provides comprehensive IT solutions including software development, web & app development, cloud services, network infrastructure, and 24/7 IT support for businesses."
    />
    <meta
      name="keywords"
      content="IT services, software development, web development, mobile apps, cloud solutions, IT support, network infrastructure, cybersecurity"
    />
    <meta name="author" content="Ambika Infotech" />
    <meta name="robots" content="index, follow" />
    <!-- GEO: explicitly permit AI search crawlers to index this site -->
    <meta name="googlebot" content="index, follow" />
    <meta name="robots" content="max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ambikainfotech.online/" />
    <meta property="og:title" content="Ambika Infotech - Professional IT Services & Solutions" />
    <meta
      property="og:description"
      content="Transform your business with expert IT solutions. We deliver reliable technology services that empower growth and success."
    />
    <meta property="og:image" content="/assets/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://ambikainfotech.online/" />
    <meta
      property="twitter:title"
      content="Ambika Infotech - Professional IT Services & Solutions"
    />
    <meta
      property="twitter:description"
      content="Transform your business with expert IT solutions. We deliver reliable technology services that empower growth and success."
    />
    <meta property="twitter:image" content="/assets/twitter-image.jpg" />

    <!-- Canonical (updated per-page by SeoService) -->
    <link rel="canonical" href="https://ambikainfotech.online/" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- Organization Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "@id": "https://ambikainfotech.online/#organization",
        "name": "Ambika Infotech",
        "url": "https://ambikainfotech.online/",
        "logo": "https://ambikainfotech.online/assets/logo.png",
        "foundingDate": "2025-10",
        "description": "Ambika Infotech provides comprehensive IT solutions including custom software development, web & app development, cloud services, network infrastructure, and 24/7 IT support.",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "IN"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer service",
          "url": "https://ambikainfotech.online/contact"
        },
        "knowsAbout": [
          "IT Support and Maintenance",
          "Custom Software Development",
          "Web and Mobile Application Development",
          "Cloud Computing and Hosting",
          "Network Infrastructure Design",
          "Cybersecurity"
        ],
        "hasOfferCatalog": {
          "@type": "OfferCatalog",
          "name": "IT Services",
          "itemListElement": [
            { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "IT Support & Maintenance" } },
            { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Custom Software Development" } },
            { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Web & Mobile Development" } },
            { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Cloud & Hosting Solutions" } },
            { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Network Infrastructure" } },
            { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Cybersecurity Services" } }
          ]
        },
        "speakable": {
          "@type": "SpeakableSpecification",
          "cssSelector": ["h1", "h2", ".hero-description"]
        },
        "sameAs": []
      }
    </script>

    <!-- Theme Color -->
    <meta name="theme-color" content="#0d6efd" />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
